x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow.Dockerfile
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    SPARK_IMAGE: ${SPARK_IMAGE}
    DBT_IMAGE: ${DBT_IMAGE}
    DOCKER_NETWORK: ${DOCKER_NETWORK}
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_REGION: ${AWS_REGION}
    S3_ENDPOINT: ${S3_ENDPOINT}
    ICEBERG_CATALOG_URI: ${ICEBERG_CATALOG_URI}
    ICEBERG_WAREHOUSE: ${ICEBERG_WAREHOUSE}
    LAKEHOUSE_BUCKET: ${LAKEHOUSE_BUCKET}
    TLC_DATASET: ${TLC_DATASET}
    TLC_MONTHS: ${TLC_MONTHS}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - /var/run/docker.sock:/var/run/docker.sock
    - airflow-logs:/opt/airflow/logs
  user: "${AIRFLOW_UID}:0"
  depends_on:
    airflow-db:
      condition: service_healthy

networks:
  default:
    name: ${DOCKER_NETWORK}

volumes:
  minio-data:
  airflow-db-data:
  airflow-logs:
  superset-db-data:

services:
  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2024-09-16T17-43-14Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${LAKEHOUSE_BUCKET};
      exit 0;
      "

  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    depends_on:
      minio:
        condition: service_healthy
    environment:
      CATALOG_WAREHOUSE: ${ICEBERG_WAREHOUSE}
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: ${S3_ENDPOINT}
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
    ports:
      - "8181:8181"

  trino:
    image: trinodb/trino:455
    depends_on:
      - iceberg-rest
    ports:
      - "8082:8080"
    volumes:
      - ./conf/trino/catalog:/etc/trino/catalog

  airflow-db:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: >
      /bin/bash -c "
      airflow db migrate &&
      airflow users create --username ${AIRFLOW_ADMIN_USER} --password ${AIRFLOW_ADMIN_PASSWORD} --firstname admin --lastname admin --role Admin --email admin@example.com
      "
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  superset-db:
    image: postgres:16
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
      POSTGRES_DB: superset
    volumes:
      - superset-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "superset"]
      interval: 10s
      timeout: 5s
      retries: 5

  superset:
    build:
      context: .
      dockerfile: docker/superset.Dockerfile
    environment:
      SUPERSET_SECRET_KEY: portfolio_superset_secret
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://superset:superset@superset-db:5432/superset
      SUPERSET_ADMIN_USER: ${AIRFLOW_ADMIN_USER}
      SUPERSET_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
    ports:
      - "8088:8088"
    depends_on:
      superset-db:
        condition: service_healthy
